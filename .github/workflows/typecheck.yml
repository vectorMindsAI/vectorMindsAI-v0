name: Type Check

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    typecheck:
        name: TypeScript Type Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run TypeScript compiler
              run: npx tsc --noEmit --pretty
              # Type errors are intentionally ignored at build time (ignoreBuildErrors: true
              # in next.config.mjs). This step is informational — fix errors incrementally.
              continue-on-error: true

            - name: Report type check result
              run: echo "TypeScript check complete (informational only — errors do not block CI)"
